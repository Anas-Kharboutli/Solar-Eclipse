<script>
var positionX = 0;
var positionY = 0;
var velocity = 5;
var reverse = true;
var ballOne = document.getElementById("ballOne");
var ballTwo = document.getElementById("ballTwo");
var ballThree = document.getElementById("ballThree");
var ballFour = document.getElementById("ballFour");

// function of first ball
function moveBallOne (){
  var Xmin = 0;
  var Xmax = 325;
  var Ymin = 0;
  var Ymax = 325;

  if(reverse){
    positionX = positionX + velocity;
    positionY = positionY + velocity;
    ballOne.style.left = positionX + "px";
    ballOne.style.top = positionY + "px";
    
  }else{
    positionX = positionX - velocity;
    positionY = positionY - velocity;
    ballOne.style.left = positionX + "px";
    ballOne.style.top = positionY + "px";
  }
if (
    positionX >= Xmax   ||
    positionX === Xmin ||
    positionY >= Ymax ||
    positionY === Ymin) {
        reverse =! reverse
    }
}
setInterval(moveBallOne,100);

</script>
